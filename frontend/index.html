<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root{
            --bg: #0f1724;
            --panel: #0b1220;
            --muted: #94a3b8;
            --card: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            --accent: #6ee7b7;
            --blue: #60a5fa;
            --glass: rgba(255,255,255,0.03);
            --radius-lg: 16px;
            --radius-md: 12px;
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #e6eef8;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(96,165,250,0.06), transparent), #0f1724;
        }

        *{box-sizing:border-box}
        html,body{height:100%;margin:0}
        body{min-height:100vh;line-height:1.45;background-repeat:no-repeat}

        header.app-header{
            display:flex;align-items:center;justify-content:space-between;gap:16px;padding:28px 28px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-bottom:1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(6px);
        }

        .header-content h1{margin:0;font-size:clamp(1.4rem,2.6vw,2.1rem);letter-spacing:-0.02em}
        .header-content p{margin:6px 0 0;color:var(--muted);font-size:0.95rem}

        .header-actions{display:flex;gap:12px;align-items:center}
        .header-actions .filter-input{width:220px;max-width:100%;padding:10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background-color:#0b1220;color:#e6eef8;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
        .header-actions .filter-input::placeholder{color:var(--muted)}
        .header-actions .filter-input:focus{outline:none;border-color:rgba(96,165,250,0.7);box-shadow:0 0 0 3px rgba(96,165,250,0.16)}
        #new-task-button{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(90deg,var(--blue),#3b82f6);color:white;border-radius:999px;border:none;cursor:pointer;font-weight:700;box-shadow:0 8px 24px rgba(59,130,246,0.18)}
        #new-task-button svg{width:16px;height:16px;flex:0 0 16px;opacity:0.98}
        #new-task-button:focus{outline:3px solid rgba(96,165,250,0.18);outline-offset:2px}

        main{max-width:1200px;margin:20px auto;padding:18px}

        .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;align-items:start}
        @media (max-width:520px){.board{grid-template-columns:1fr;gap:12px}}

        .column{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);border-radius:var(--radius-lg);padding:0;display:flex;flex-direction:column;min-height:160px}
        .column-header{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;justify-content:space-between;align-items:center}
        .column-header h2{margin:0;font-size:0.85rem;text-transform:uppercase;color:var(--muted);letter-spacing:0.14em}
        .column-header .count{background:var(--glass);padding:6px 10px;border-radius:999px;font-weight:700;color:var(--muted);font-size:0.85rem}

        .column-body{padding:14px;display:flex;flex-direction:column;gap:12px;min-height:120px}

        .card{background:var(--card);border-radius:var(--radius-md);padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.6);display:grid;gap:8px;transition:transform .18s ease,box-shadow .18s ease}
        .card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(2,6,23,0.7)}
        .card.dragging{opacity:0.6}

        .card-title{margin:0;font-size:1rem;font-weight:700;color:#f8fafc}
        .card-description{margin:0;color:var(--muted);font-size:0.92rem;white-space:pre-wrap}

        .card-footer{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
        .priority-pill{padding:6px 12px;border-radius:999px;font-weight:700;font-size:0.78rem;letter-spacing:0.01em;text-transform:uppercase}
        .priority-pill.low{background:rgba(110,231,183,0.08);color:#34d399}
        .priority-pill.medium{background:rgba(250,204,21,0.06);color:#f59e0b}
        .priority-pill.high{background:rgba(248,113,113,0.06);color:#f87171}
        .card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
        .tag-chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:0.78rem;color:var(--muted);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08)}

        .empty-placeholder{border-radius:12px;padding:14px;border:1px dashed rgba(255,255,255,0.04);background:transparent;color:var(--muted);min-height:84px;display:grid;place-content:center}

        .error-card{background:linear-gradient(180deg, rgba(248,113,113,0.06), rgba(248,113,113,0.02));border:1px solid rgba(248,113,113,0.12);color:#fecaca;padding:14px;border-radius:12px}

        .modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(0deg,rgba(2,6,23,0.78),rgba(2,6,23,0.78));backdrop-filter:blur(8px);z-index:1000;padding:20px}
        .modal-overlay.open{display:flex}
        .modal-dialog{width:min(560px,100%);border-radius:18px;background:linear-gradient(180deg,rgba(15,23,42,0.96),rgba(10,16,30,0.96));border:1px solid rgba(255,255,255,0.08);box-shadow:0 30px 60px rgba(2,6,23,0.85);overflow:hidden;color:#e6eef8}
        .modal-header{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02)}
        .modal-header h2{margin:0;font-size:1.05rem;color:#f8fafc}
        .modal-header button{border:none;background:transparent;color:var(--muted);font-size:1.35rem;cursor:pointer;line-height:1}
        .modal-body{padding:20px;display:grid;gap:14px}
        .modal-field{display:grid;gap:8px}
        .modal-field label{font-weight:700;color:#e6eef8;font-size:0.92rem}
        .modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background-color:#0b1220;color:#e6eef8;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
        .modal-field input::placeholder,.modal-field textarea::placeholder{color:var(--muted)}
        .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{outline:none;border-color:rgba(96,165,250,0.7);box-shadow:0 0 0 3px rgba(96,165,250,0.16)}
        .modal-error{display:none;padding:12px 14px;border-radius:12px;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.18);color:#fecaca}
        .modal-error.visible{display:block}
        .modal-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 20px 20px}
        .modal-button{padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:700}
        .modal-button.primary{background:linear-gradient(90deg,var(--blue),#3b82f6);color:white}
        .modal-button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted)}

        @keyframes shimmer{100%{transform:translateX(120%)}}
    </style>
      
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>Task Board</h1>
            <p>Change a task's status using the dropdown on each card.</p>
        </div>
        <div class="header-actions">
            <input id="tag-filter-input" class="filter-input" type="search" placeholder="Filter by tag" aria-label="Filter tasks by tag" />
            <button type="button" id="new-task-button" aria-label="Create new task">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>New Task</span>
            </button>
        </div>
    </header>
    <main>
        <section id="board" class="board" aria-live="polite"></section>
    </main>

    <div id="edit-task-modal" class="modal-overlay" aria-hidden="true">
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-task-title">
            <div class="modal-header">
                <h2 id="edit-task-title">Edit Task</h2>
                <button type="button" id="edit-task-close" aria-label="Close">×</button>
            </div>
            <form id="edit-task-form">
                <div class="modal-body">
                    <div id="edit-task-error" class="modal-error" role="alert"></div>
                    <div class="modal-field">
                        <label for="edit-task-title-input">Title</label>
                        <input id="edit-task-title-input" name="title" type="text" required maxlength="200" />
                    </div>
                    <div class="modal-field">
                        <label for="edit-task-description-input">Description</label>
                        <textarea id="edit-task-description-input" name="description" maxlength="2000"></textarea>
                    </div>
                    <div class="modal-field">
                        <label for="edit-task-priority-select">Priority</label>
                        <select id="edit-task-priority-select" name="priority" required>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="modal-field">
                        <label for="edit-task-due-date-input">Due date</label>
                        <input id="edit-task-due-date-input" name="due_date" type="date" />
                    </div>
                    <div class="modal-field">
                        <label for="edit-task-assignee-input">Assignee</label>
                        <input id="edit-task-assignee-input" name="assignee" type="text" maxlength="200" />
                    </div>
                    <div class="modal-field">
                        <label for="edit-task-tags-input">Tags</label>
                        <input id="edit-task-tags-input" name="tags" type="text" maxlength="200" placeholder="Comma-separated tags" />
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="edit-task-cancel" class="modal-button secondary">Cancel</button>
                    <button type="submit" id="edit-task-submit" class="modal-button primary">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // Keys must match the backend's TaskStatus enum values exactly (ToDo, InProgress, Done)
        const STATUS_LABELS = {
            ToDo: 'To Do',
            InProgress: 'In Progress',
            Done: 'Done'
        };

        const PRIORITY_ORDERS = {
            High: 0,
            Medium: 1,
            Low: 2
        };

        let tasks = [];
        let boardState = 'loading';
        let boardError = '';
        let activeTagFilter = '';

        async function fetchTasks(tagFilter = activeTagFilter) {
            activeTagFilter = (tagFilter || '').trim();
            boardState = 'loading';
            boardError = '';
            render();

            const filterQuery = activeTagFilter ? `?tag=${encodeURIComponent(activeTagFilter)}` : '';
            const url = `${API_BASE}/tasks${filterQuery}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }

                const data = await response.json();
                tasks = Array.isArray(data) ? data : [];
                boardState = 'ready';
            } catch (error) {
                boardState = 'error';
                boardError = error.message || 'Unable to load tasks.';
                tasks = [];
            }

            render();
        }

        function render() {
            clearError();
            const board = document.querySelector('#board');
            board.innerHTML = '';

            if (boardState === 'loading') {
                board.appendChild(renderLoadingState());
                return;
            }

            if (boardState === 'error') {
                board.appendChild(renderErrorState());
                return;
            }

            board.appendChild(renderBoard());
        }

        function renderLoadingState() {
            const wrapper = document.createElement('div');
            wrapper.className = 'board';

            Object.values(STATUS_LABELS).forEach(() => {
                const column = document.createElement('div');
                column.className = 'column';
                column.innerHTML = `
                    <div class="column-header">
                        <h2>Loading</h2>
                    </div>
                    <div class="column-body">
                        <div class="skeleton-card">
                            <div class="skeleton-group">
                                <div class="skeleton-line medium"></div>
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line tall"></div>
                            </div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-group">
                                <div class="skeleton-line"></div>
                                <div class="skeleton-line short"></div>
                            </div>
                        </div>
                    </div>
                `;
                wrapper.appendChild(column);
            });

            return wrapper;
        }

        function renderErrorState() {
            const errorCard = document.createElement('div');
            errorCard.className = 'error-card';
            errorCard.innerHTML = `
                <strong>Unable to load tasks</strong>
                <p>${escapeHtml(boardError)}</p>
            `;
            return errorCard;
        }

        function renderBoard() {
            const wrapper = document.createElement('div');
            wrapper.className = 'board';

            Object.entries(STATUS_LABELS).forEach(([statusKey, statusLabel]) => {
                const columnTasks = tasks
                    .filter(task => task.status === statusKey)
                    .sort((a, b) => {
                        const priorityCompare = (PRIORITY_ORDERS[a.priority] ?? 99) - (PRIORITY_ORDERS[b.priority] ?? 99);
                        if (priorityCompare !== 0) {
                            return priorityCompare;
                        }
                        return String(a.title || '').localeCompare(String(b.title || ''));
                    });

                const column = document.createElement('div');
                column.className = 'column';
                column.innerHTML = `
                    <div class="column-header">
                        <h2>${statusLabel}</h2>
                        <span class="count">${columnTasks.length}</span>
                    </div>
                    <div class="column-body"></div>
                `;

                const body = column.querySelector('.column-body');

                if (columnTasks.length === 0) {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'empty-placeholder';
                    placeholder.innerHTML = '<p>Drop tasks here</p>';
                    body.appendChild(placeholder);
                } else {
                    columnTasks.forEach(task => body.appendChild(renderCard(task)));
                }

                wrapper.appendChild(column);
            });

            return wrapper;
        }

        function renderCard(task) {
            const card = document.createElement('article');
            card.className = 'card';
            card.draggable = true;
            card.dataset.taskId = task.id;

            // Status dropdown lets the user change a task's status (calls PATCH on change)
            const statusOptions = Object.keys(STATUS_LABELS).map(key => {
                const selected = key === task.status ? 'selected' : '';
                return `<option value="${key}" ${selected}>${STATUS_LABELS[key]}</option>`;
            }).join('');

            const tagChips = (task.tags || []).map(tag => `<span class="tag-chip">${escapeHtml(tag)}</span>`).join('');
            card.innerHTML = `
                <div>
                    <h3 class="card-title">${escapeHtml(task.title || 'Untitled task')}</h3>
                    <p class="card-description">${escapeHtml(task.description || '')}</p>
                    ${tagChips ? `<div class="card-tags">${tagChips}</div>` : ''}
                </div>
                <div class="card-footer">
                    <span class="priority-pill ${String(task.priority || '').toLowerCase()}">${escapeHtml(task.priority || 'Low')}</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <select class="status-select" data-action="status-select" data-task-id="${escapeHtml(task.id)}">${statusOptions}</select>
                        <button type="button" data-action="edit-task" data-task-id="${escapeHtml(task.id)}">Edit</button>
                    </div>
                </div>
            `;
            return card;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseTagInput(value) {
            return String(value || '')
                .split(',')
                .map(tag => tag.trim())
                .filter(tag => tag.length > 0);
        }

        // Shows a persistent error banner above the board (e.g. failed status update)
        function showError(message) {
            clearError();
            const board = document.querySelector('#board');
            const banner = document.createElement('div');
            banner.id = 'board-error-banner';
            banner.className = 'error-card';
            banner.style.margin = '0 0 16px 0';
            banner.innerHTML = `<strong>Error</strong><p>${escapeHtml(message)}</p>`;
            board.parentNode.insertBefore(banner, board);
        }

        function clearError() {
            const existing = document.querySelector('#board-error-banner');
            if (existing) existing.remove();
        }

        let activeTaskToEdit = null;
        let activeTaskMode = 'edit';

        function setModalError(message) {
            const errorElement = document.querySelector('#edit-task-error');
            if (!errorElement) return;
            if (!message) {
                errorElement.textContent = '';
                errorElement.classList.remove('visible');
                return;
            }
            errorElement.textContent = message;
            errorElement.classList.add('visible');
        }

        function openEditModal(task) {
            if (!task) return;
            activeTaskMode = 'edit';
            activeTaskToEdit = task;
            const overlay = document.querySelector('#edit-task-modal');
            const titleInput = document.querySelector('#edit-task-title-input');
            const descriptionInput = document.querySelector('#edit-task-description-input');
            const assigneeInput = document.querySelector('#edit-task-assignee-input');
            const prioritySelect = document.querySelector('#edit-task-priority-select');
            const dueDateInput = document.querySelector('#edit-task-due-date-input');
            const modalTitle = document.querySelector('#edit-task-title');
            const submitButton = document.querySelector('#edit-task-submit');

            titleInput.value = task.title || '';
            descriptionInput.value = task.description || '';
            assigneeInput.value = task.assignee || '';
            const tagsInput = document.querySelector('#edit-task-tags-input');
            tagsInput.value = (task.tags || []).join(', ');
            prioritySelect.value = task.priority || 'Low';
            dueDateInput.value = task.due_date || '';
            modalTitle.textContent = 'Edit Task';
            submitButton.textContent = 'Save changes';
            setModalError('');

            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            titleInput.focus();
        }

        function openCreateModal() {
            activeTaskMode = 'create';
            activeTaskToEdit = null;
            const overlay = document.querySelector('#edit-task-modal');
            const titleInput = document.querySelector('#edit-task-title-input');
            const descriptionInput = document.querySelector('#edit-task-description-input');
            const assigneeInput = document.querySelector('#edit-task-assignee-input');
            const prioritySelect = document.querySelector('#edit-task-priority-select');
            const dueDateInput = document.querySelector('#edit-task-due-date-input');
            const modalTitle = document.querySelector('#edit-task-title');
            const submitButton = document.querySelector('#edit-task-submit');

            titleInput.value = '';
            descriptionInput.value = '';
            assigneeInput.value = '';
            const tagsInput = document.querySelector('#edit-task-tags-input');
            tagsInput.value = '';
            prioritySelect.value = 'Low';
            dueDateInput.value = '';
            modalTitle.textContent = 'New Task';
            submitButton.textContent = 'Create task';
            setModalError('');

            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            titleInput.focus();
        }

        function closeEditModal() {
            activeTaskToEdit = null;
            const overlay = document.querySelector('#edit-task-modal');
            const form = document.querySelector('#edit-task-form');
            if (!overlay || !form) return;
            form.reset();
            setModalError('');
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
        }

        async function handleEditSubmit() {
            const titleInput = document.querySelector('#edit-task-title-input');
            const descriptionInput = document.querySelector('#edit-task-description-input');
            const assigneeInput = document.querySelector('#edit-task-assignee-input');
            const tagsInput = document.querySelector('#edit-task-tags-input');
            const prioritySelect = document.querySelector('#edit-task-priority-select');
            const dueDateInput = document.querySelector('#edit-task-due-date-input');

            const payload = {
                title: titleInput.value.trim(),
                description: descriptionInput.value.trim() || null,
                assignee: assigneeInput.value.trim() === '' ? null : assigneeInput.value.trim(),
                priority: prioritySelect.value,
                due_date: dueDateInput.value ? dueDateInput.value : null,
                tags: parseTagInput(tagsInput.value),
            };

            const isCreate = activeTaskMode === 'create';
            const url = isCreate ? `${API_BASE}/tasks` : `${API_BASE}/tasks/${encodeURIComponent(activeTaskToEdit?.id ?? '')}`;
            const method = isCreate ? 'POST' : 'PATCH';

            if (!isCreate && !activeTaskToEdit) return;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (res.ok) {
                    setModalError('');
                    clearError();
                    closeEditModal();
                    await fetchTasks();
                    return;
                }

                let message = res.statusText || 'Unable to update task.';
                const contentType = res.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    try {
                        const json = await res.json();
                        if (typeof json.detail === 'string') {
                            message = json.detail;
                        } else if (typeof json.detail === 'object' && json.detail !== null) {
                            message = JSON.stringify(json.detail);
                        }
                    } catch (_){
                        // fallback to text below
                    }
                } else {
                    const errorText = await res.text();
                    if (errorText) {
                        message = errorText;
                    }
                }

                setModalError(`Server error (${res.status}): ${message}`);
            } catch (err) {
                setModalError(`Network error: ${err.message}`);
            }
        }

        function getTaskById(taskId) {
            return tasks.find(t => t.id === taskId) || null;
        }

        // Tracks the card being dragged and its original status
        let draggedCard = null;
        let draggedFromStatus = null;

        function getStatusFromColumn(columnEl) {
            const header = columnEl.querySelector('.column-header h2');
            if (!header) return null;
            const label = header.textContent.trim();
            for (const [key, value] of Object.entries(STATUS_LABELS)) {
                if (value === label) return key;
            }
            return null;
        }

        function attachDragListeners() {
            const boardEl = document.querySelector('#board');

            // dragstart: mark the card being dragged
            boardEl.addEventListener('dragstart', (ev) => {
                const card = ev.target.closest('.card[draggable="true"]');
                if (!card) return;

                draggedCard = card;
                draggedFromStatus = card.dataset.taskId ? 
                    tasks.find(t => t.id === card.dataset.taskId)?.status : null;

                card.classList.add('dragging');
                ev.dataTransfer.effectAllowed = 'move';
            });

            // dragend: cleanup
            boardEl.addEventListener('dragend', (ev) => {
                const card = ev.target.closest('.card[draggable="true"]');
                if (card) card.classList.remove('dragging');
                draggedCard = null;
                draggedFromStatus = null;

                // Clear all drag-over states
                document.querySelectorAll('.column-body.drag-over').forEach(el => {
                    el.classList.remove('drag-over');
                });
            });

            // dragover: allow drop and show visual feedback
            boardEl.addEventListener('dragover', (ev) => {
                const columnBody = ev.target.closest('.column-body');
                if (!columnBody || !draggedCard) return;

                ev.preventDefault();
                ev.dataTransfer.dropEffect = 'move';
                columnBody.classList.add('drag-over');
            });

            // dragleave: remove visual feedback if leaving the column-body
            boardEl.addEventListener('dragleave', (ev) => {
                const columnBody = ev.target.closest('.column-body');
                if (!columnBody) return;

                // Only remove if we're actually leaving the column-body (not just a child)
                if (!columnBody.contains(ev.relatedTarget)) {
                    columnBody.classList.remove('drag-over');
                }
            });

            // drop: handle the actual drop
            boardEl.addEventListener('drop', async (ev) => {
                ev.preventDefault();

                const columnBody = ev.target.closest('.column-body');
                if (!columnBody || !draggedCard) return;

                columnBody.classList.remove('drag-over');

                const targetStatus = getStatusFromColumn(columnBody.closest('.column'));
                if (!targetStatus) return;

                // If dropped in the same status column, do nothing
                if (draggedFromStatus === targetStatus) return;

                const taskId = draggedCard.dataset.taskId;
                if (!taskId) return;

                // Call the existing handler which does optimistic update and PATCH
                await handleStatusChange(taskId, targetStatus);
            });
        }

        // Optimistically updates task status in the UI, then persists via PATCH.
        // Reverts and shows an error banner if the request fails (e.g. invalid transition).
        async function handleStatusChange(taskId, newStatus) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const previousStatus = task.status;
            if (previousStatus === newStatus) return;

            task.status = newStatus;
            render();

            try {
                const res = await fetch(`${API_BASE}/tasks/${encodeURIComponent(taskId)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (res.ok) {
                    try {
                        const updated = await res.json();
                        const idx = tasks.findIndex(t => t.id === taskId);
                        if (idx !== -1) tasks[idx] = updated;
                    } catch (_) {
                        // ignore JSON parse errors on success path
                    }
                    clearError();
                    render();
                    return;
                }

                const text = await res.text();
                task.status = previousStatus;
                render();
                showError(`Server error (${res.status}): ${text || res.statusText}`);
            } catch (err) {
                task.status = previousStatus;
                render();
                showError(`Network error: ${err.message}`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const boardEl = document.querySelector('#board');
            boardEl.addEventListener('change', (ev) => {
                const target = ev.target;
                if (target && target.dataset && target.dataset.action === 'status-select') {
                    handleStatusChange(target.dataset.taskId, target.value);
                }
            });

            boardEl.addEventListener('click', (ev) => {
                const button = ev.target.closest('button[data-action="edit-task"]');
                if (!button) return;
                const taskId = button.dataset.taskId;
                const task = getTaskById(taskId);
                if (task) {
                    openEditModal(task);
                }
            });

            const newTaskButton = document.querySelector('#new-task-button');
            if (newTaskButton) {
                newTaskButton.addEventListener('click', openCreateModal);
            }

            const tagFilterInput = document.querySelector('#tag-filter-input');
            if (tagFilterInput) {
                tagFilterInput.value = activeTagFilter;
                tagFilterInput.addEventListener('keydown', async (ev) => {
                    if (ev.key === 'Enter') {
                        ev.preventDefault();
                        await fetchTasks(tagFilterInput.value);
                    }
                });
                tagFilterInput.addEventListener('input', async () => {
                    if (tagFilterInput.value.trim() === '') {
                        await fetchTasks('');
                    }
                });
            }

            const editModalOverlay = document.querySelector('#edit-task-modal');
            const editForm = document.querySelector('#edit-task-form');
            const editClose = document.querySelector('#edit-task-close');
            const editCancel = document.querySelector('#edit-task-cancel');

            if (editModalOverlay) {
                editModalOverlay.addEventListener('click', (ev) => {
                    if (ev.target === editModalOverlay) {
                        closeEditModal();
                    }
                });
            }

            if (editClose) {
                editClose.addEventListener('click', closeEditModal);
            }

            if (editCancel) {
                editCancel.addEventListener('click', closeEditModal);
            }

            document.addEventListener('keydown', (ev) => {
                if (ev.key === 'Escape' && editModalOverlay && editModalOverlay.classList.contains('open')) {
                    closeEditModal();
                }
            });

            if (editForm) {
                editForm.addEventListener('submit', async (ev) => {
                    ev.preventDefault();
                    await handleEditSubmit();
                });
            }

            // Attach drag-and-drop listeners
            attachDragListeners();

            fetchTasks();
        });
    </script>
</body>
</html>
